<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Topic Radar</title>
  <style>
    :root {
      color-scheme: light;
      --line: #e5e7eb;
      --muted: #6b7280;
      --text: #111827;
      --bg: #f8fafc;
      --panel: #ffffff;
      --accent: #2563eb;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.2;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0;
    }
    .metric {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .metric span {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .metric strong {
      font-size: 24px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin: 22px 0 14px;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text);
      background: var(--panel);
      cursor: pointer;
    }
    button.active {
      color: #ffffff;
      border-color: var(--accent);
      background: var(--accent);
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    table {
      width: 100%;
      min-width: 1080px;
      border-collapse: collapse;
      font-size: 14px;
    }
    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: #f9fafb;
      color: #374151;
      font-size: 13px;
      z-index: 1;
    }
    th button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 0;
      padding: 0;
      color: inherit;
      background: transparent;
      font: inherit;
      cursor: pointer;
    }
    th button:hover {
      color: var(--accent);
    }
    .sort-mark {
      color: var(--accent);
      font-size: 11px;
    }
    td.reason {
      max-width: 360px;
      white-space: normal;
      color: #374151;
    }
    .status {
      margin-top: 22px;
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      color: #065f46;
      background: #d1fae5;
    }
    .error {
      color: #991b1b;
      background: #fee2e2;
    }
    @media (max-width: 760px) {
      header {
        display: block;
      }
      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Topic Radar</h1>
        <p>커뮤니티 카페 주제 후보를 일/주/월 누적 랭킹으로 확인합니다.</p>
      </div>
      <p id="date">데이터 로딩 중</p>
    </header>

    <section class="metrics" id="metrics"></section>

    <nav class="tabs" aria-label="후보 기간">
      <button class="active" data-tab="today">오늘 후보</button>
      <button data-tab="weekly">7일 누적</button>
      <button data-tab="monthly">30일 누적</button>
    </nav>

    <section class="table-wrap">
      <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </section>

    <section class="status">
      <h2>수집 상태</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>소스</th>
              <th>상태</th>
              <th>수집</th>
              <th>요청</th>
              <th>성공</th>
              <th>실패</th>
              <th>캐시</th>
            </tr>
          </thead>
          <tbody id="status-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const numberFormat = new Intl.NumberFormat("ko-KR");
    let dashboardData = null;
    let currentTab = "today";
    let currentSort = { key: "practical_score", direction: "desc" };

    const todayColumns = [
      ["niche", "세부 주제"],
      ["keyword", "검색키워드"],
      ["category", "카테고리"],
      ["monthly_total", "월검색량"],
      ["cafe_total", "카페글"],
      ["kin_total", "지식iN"],
      ["kakao_cafe_total", "다음카페"],
      ["shopping_total", "쇼핑"],
      ["practical_score", "실전점수"],
      ["supply_gap_score", "수요공급"],
      ["saturation", "포화도"],
      ["topic_reason", "판단 근거"]
    ];
    const accumulatedColumns = [
      ["niche", "세부 주제"],
      ["keyword", "검색키워드"],
      ["judgment", "판단"],
      ["appeared_days", "출현일수"],
      ["avg_monthly_total", "평균검색량"],
      ["avg_practical_score", "평균점수"],
      ["max_practical_score", "최고점수"],
      ["avg_cafe_total", "카페글"],
      ["avg_kin_total", "지식iN"],
      ["avg_kakao_cafe_total", "다음카페"],
      ["avg_shopping_total", "쇼핑"],
      ["cumulative_score", "누적점수"],
      ["reason", "판단 근거"]
    ];

    async function init() {
      try {
        const response = await fetch("/data/summary.json", { cache: "no-store" });
        if (!response.ok) throw new Error("summary.json을 불러오지 못했습니다.");
        dashboardData = await response.json();
        render();
      } catch (error) {
        document.querySelector("#table-body").innerHTML =
          `<tr><td class="reason" colspan="12">${escapeHtml(error.message)}</td></tr>`;
      }
    }

    function render() {
      renderDate();
      renderMetrics();
      renderTable();
      renderStatus();
    }

    function renderDate() {
      document.querySelector("#date").textContent =
        `${dashboardData.date} 기준, 생성 ${dashboardData.generated_at}`;
    }

    function renderMetrics() {
      const metrics = dashboardData.metrics;
      const items = [
        ["수집 항목", metrics.total_items_collected],
        ["키워드 수", metrics.total_keywords_extracted],
        ["신규 키워드", metrics.new_keywords_count],
        ["급상승 키워드", metrics.rising_keywords_count]
      ];
      document.querySelector("#metrics").innerHTML = items.map(([label, value]) => `
        <article class="metric">
          <span>${label}</span>
          <strong>${formatValue(value)}</strong>
        </article>
      `).join("");
    }

    function renderTable() {
      const columns = currentTab === "today" ? todayColumns : accumulatedColumns;
      const rows = sortRows(dashboardData[currentTab] || []);
      document.querySelector("#table-head").innerHTML = `
        <tr>${columns.map(([key, label]) => renderHeaderCell(key, label)).join("")}</tr>
      `;
      document.querySelector("#table-body").innerHTML = rows.map((row) => `
        <tr>${columns.map(([key]) => renderCell(key, row[key])).join("")}</tr>
      `).join("");
      bindSortButtons();
    }

    function renderHeaderCell(key, label) {
      const mark = currentSort.key === key
        ? `<span class="sort-mark">${currentSort.direction === "asc" ? "▲" : "▼"}</span>`
        : "";
      return `<th><button type="button" data-sort="${key}">${label}${mark}</button></th>`;
    }

    function bindSortButtons() {
      document.querySelectorAll("[data-sort]").forEach((button) => {
        button.addEventListener("click", () => {
          const key = button.dataset.sort;
          const isSameKey = currentSort.key === key;
          currentSort = {
            key,
            direction: isSameKey && currentSort.direction === "desc" ? "asc" : "desc"
          };
          renderTable();
        });
      });
    }

    function sortRows(rows) {
      return [...rows].sort((left, right) => {
        const compared = compareValues(left[currentSort.key], right[currentSort.key]);
        return currentSort.direction === "asc" ? compared : -compared;
      });
    }

    function compareValues(left, right) {
      if (typeof left === "number" && typeof right === "number") {
        return left - right;
      }
      return String(left ?? "").localeCompare(String(right ?? ""), "ko-KR", {
        numeric: true,
        sensitivity: "base"
      });
    }

    function renderCell(key, value) {
      const className = key.includes("reason") || key === "topic_reason" ? "reason" : "";
      return `<td class="${className}">${escapeHtml(formatValue(value))}</td>`;
    }

    function renderStatus() {
      const rows = dashboardData.collection_status || [];
      document.querySelector("#status-body").innerHTML = rows.map((row) => `
        <tr>
          <td>${escapeHtml(row.source)}</td>
          <td><span class="badge ${row.status === "failed" ? "error" : ""}">
            ${escapeHtml(row.status)}
          </span></td>
          <td>${formatValue(row.items_collected)}</td>
          <td>${formatValue(row.request_count)}</td>
          <td>${formatValue(row.success_count)}</td>
          <td>${formatValue(row.failure_count)}</td>
          <td>${formatValue(row.cache_hits)}</td>
        </tr>
      `).join("");
    }

    function formatValue(value) {
      if (typeof value === "number") return numberFormat.format(value);
      if (value === null || value === undefined) return "";
      return String(value);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.querySelectorAll("[data-tab]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-tab]").forEach((item) => {
          item.classList.remove("active");
        });
        button.classList.add("active");
        currentTab = button.dataset.tab;
        currentSort = getDefaultSort(currentTab);
        renderTable();
      });
    });

    function getDefaultSort(tab) {
      if (tab === "today") return { key: "practical_score", direction: "desc" };
      return { key: "cumulative_score", direction: "desc" };
    }

    init();
  </script>
</body>
</html>
