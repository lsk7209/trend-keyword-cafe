<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Topic Radar</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
      background: #f8fafc;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 36px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 14px;
      font-size: 16px;
      line-height: 1.7;
      color: #374151;
    }
    code {
      padding: 2px 6px;
      border-radius: 4px;
      background: #e5e7eb;
    }
    .panel {
      margin-top: 28px;
      padding: 20px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Topic Radar</h1>
    <p>커뮤니티 카페 주제 후보를 수집하고 일/주/월 누적 랭킹으로 분석하는 Python 프로젝트입니다.</p>
    <div class="panel">
      <p>Vercel 배포는 코드 저장소 상태 확인용 정적 페이지입니다.</p>
      <p>실제 Streamlit 대시보드는 로컬에서 <code>python scripts/run_dashboard.py</code>로 실행합니다.</p>
      <p>일일 수집은 Windows 작업 스케줄러 <code>TrendKeywordCafeDaily</code>로 실행됩니다.</p>
    </div>
  </main>
</body>
</html>
